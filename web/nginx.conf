# FormForge SPA — serves the built Vite app and reverse-proxies the API.
# The frontend uses relative /api paths (same-origin), so nginx forwards
# /api and /health to the `api` service on the compose network. This keeps
# the browser talking to a single origin, so no CORS is involved.

# Preserve the scheme from the upstream proxy: behind Dokploy, Traefik terminates
# TLS and sets X-Forwarded-Proto: https, but the Traefik->nginx hop is plain HTTP,
# so $scheme is "http" here. Forwarding $scheme would clobber the real client scheme
# and make the API see http (breaking the refresh cookie's Secure flag). Honor the
# incoming header when present; fall back to $scheme for direct/local access.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve the `api` hostname at request time via Docker's embedded DNS
    # (127.0.0.11) instead of caching the IP at startup. Without this, recreating
    # the api container (which gives it a new IP) makes nginx proxy to a stale
    # address and return 502 until web is restarted. The variable forces runtime
    # resolution.
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:8080;

    # API + auth routes -> backend container.
    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        # File uploads (icons, datasets) can exceed the 1m default.
        client_max_body_size 25m;
    }

    # Health endpoints exposed by the API.
    location /health {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback — every other path serves index.html so client-side
    # routing (TanStack Router) handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
